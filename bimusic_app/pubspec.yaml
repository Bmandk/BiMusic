name: bimusic_app
description: BiMusic — self-hosted music streaming client
version: 1.3.0+4

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  dio: ^5.7.0
  just_audio: ^0.9.0
  media_kit: ^1.2.6
  media_kit_libs_windows_video: ^1.0.0
  audio_service: ^0.18.0
  audio_session: ^0.1.0
  connectivity_plus: ^6.1.0
  flutter_secure_storage: ^9.2.0
  path_provider: ^2.1.0
  go_router: ^14.6.0
  cached_network_image: ^3.4.0
  flutter_background_service: ^5.0.0
  logger: ^2.4.0
  package_info_plus: ^8.0.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  url_launcher: ^6.3.0
  open_filex: ^4.5.0
  window_manager: ^0.4.3
  tray_manager: ^0.5.0
  launch_at_startup: ^0.3.1
  rxdart: ^0.28.0
  file_picker: ^8.1.0
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.6.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tray_icon.ico
    - assets/tray_icon.png
