name: Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-unit:
    name: Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  integration:
    name: Integration Tests
    needs: [lint-unit]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm run test:integration
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: backend/test-results/

  deploy:
    name: Deploy Backend
    if: github.event_name == 'push'
    needs: [integration]
    runs-on: self-hosted
    env:
      PM2_HOME: /etc/.pm2
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Copy env file
        run: cp /etc/bimusic/.env .env
      - run: npm ci
      - run: npx tsc
      - run: mkdir -p dist/db && cp -r src/db/migrations dist/db/
      - run: npm prune --omit=dev
      - name: Restart service
        run: |
          set -a && source /etc/bimusic/.env && set +a
          pm2 delete bimusic-backend 2>/dev/null || true
          pm2 start dist/index.js --name bimusic-backend
          pm2 save
