name: Flutter

on:
  push:
    branches: [main]
    paths:
      - "bimusic_app/**"
      - ".github/workflows/flutter.yml"
    tags:
      - "bimusic_app-v*"
  pull_request:
    branches: [main]
    paths:
      - "bimusic_app/**"
      - ".github/workflows/flutter.yml"

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-unit:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bimusic_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.x"
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --fatal-infos
      - run: flutter test --coverage
      - name: Check Flutter coverage threshold (≥70% lines)
        run: |
          sudo apt-get install -y lcov 2>/dev/null
          echo ""
          echo "=== lcov coverage summary ==="
          lcov --summary coverage/lcov.info 2>&1
          echo ""
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -E 'lines\.*:' | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "Extracted line coverage : ${COVERAGE}%"
          echo "Required threshold      : 70%"
          if [ -z "$COVERAGE" ]; then
            echo "ERROR: Could not parse line coverage percentage from lcov output" >&2
            exit 1
          fi
          if awk "BEGIN { if ($COVERAGE + 0 < 70) { exit 1 } else { exit 0 } }"; then
            echo "PASS: ${COVERAGE}% meets the 70% line coverage threshold"
          else
            echo "FAIL: ${COVERAGE}% is below the 70% line coverage threshold" >&2
            echo ""
            echo "=== Files with lowest coverage ==="
            lcov --list coverage/lcov.info 2>&1 | tail -30
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: bimusic_app/coverage/

  build-android:
    name: Build Android APK
    if: startsWith(github.ref, 'refs/tags/bimusic_app-v')
    needs: [lint-unit]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bimusic_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.x"
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Set up release signing
        working-directory: bimusic_app/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/bimusic-release.jks
          cat > key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=bimusic
          storeFile=bimusic-release.jks
          EOF
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bimusic_app/build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows App
    if: startsWith(github.ref, 'refs/tags/bimusic_app-v')
    needs: [lint-unit]
    runs-on: windows-latest
    defaults:
      run:
        working-directory: bimusic_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.x"
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release
      - name: Zip Windows build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "bimusic_app-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: bimusic_app/bimusic_app-windows-x64.zip

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/bimusic_app-v')
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android
      - uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: artifacts/windows
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android/app-release.apk
            artifacts/windows/bimusic_app-windows-x64.zip
