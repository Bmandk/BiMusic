name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Lint & Unit (parallel) ──────────────────────────
  backend-lint-unit:
    name: Backend Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test:unit -- --coverage
      - name: Check backend coverage threshold (≥80% lines)
        run: npx c8 check-coverage --lines 80 --branches 75
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  flutter-lint-unit:
    name: Flutter Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bimusic_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.x"
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --fatal-infos
      - run: flutter test --coverage
      - name: Check Flutter coverage threshold (≥70% lines)
        run: |
          sudo apt-get install -y lcov
          lcov --summary coverage/lcov.info | grep -E 'lines' | awk '{if ($2+0 < 70) exit 1}'
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: bimusic_app/coverage/

  # ── Stage 2: Integration (depends on stage 1) ───────────────
  backend-integration:
    name: Backend Integration Tests
    needs: [backend-lint-unit]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm run test:integration
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: backend/test-results/
