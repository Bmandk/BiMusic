name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Lint & All Tests (parallel) ─────────────────────
  backend-lint-unit:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  flutter-lint-unit:
    name: Flutter Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bimusic_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.x"
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --fatal-infos
      - run: flutter test --coverage
      - name: Check Flutter coverage threshold (≥70% lines)
        run: |
          sudo apt-get install -y lcov 2>/dev/null
          echo ""
          echo "=== lcov coverage summary ==="
          lcov --summary coverage/lcov.info 2>&1
          echo ""
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -E 'lines\.*:' | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "Extracted line coverage : ${COVERAGE}%"
          echo "Required threshold      : 70%"
          if [ -z "$COVERAGE" ]; then
            echo "ERROR: Could not parse line coverage percentage from lcov output" >&2
            exit 1
          fi
          if awk "BEGIN { if ($COVERAGE + 0 < 70) { exit 1 } else { exit 0 } }"; then
            echo "PASS: ${COVERAGE}% meets the 70% line coverage threshold"
          else
            echo "FAIL: ${COVERAGE}% is below the 70% line coverage threshold" >&2
            echo ""
            echo "=== Files with lowest coverage ==="
            lcov --list coverage/lcov.info 2>&1 | tail -30
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: bimusic_app/coverage/

  # ── Stage 2: Integration (redundant safety check) ────────────
  backend-integration:
    name: Backend Integration Tests
    needs: [backend-lint-unit]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm run test:integration
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: backend/test-results/
